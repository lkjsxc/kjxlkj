name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6

      - name: Prepare artifact directories
        run: |
          mkdir -p tmp/visual-artifacts tmp/ci-logs

      - name: Prepare compose environment
        run: |
          cp .env.example .env

      - name: Build compose images
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.verify.yml build app verify visual-verify

      - name: Start application services
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.verify.yml up -d postgres app

      - name: Run repository verification
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.verify.yml run --rm verify

      - name: Run browser verification
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml -f docker-compose.verify.yml run --rm visual-verify

      - name: Collect compose logs
        if: always()
        run: |
          docker compose -f docker-compose.yml -f docker-compose.verify.yml ps > tmp/ci-logs/compose-ps.txt || true
          docker compose -f docker-compose.yml -f docker-compose.verify.yml logs postgres app > tmp/ci-logs/compose.log || true

      - name: Tear down compose services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.verify.yml down -v || true

      - name: Upload visual artifacts
        if: always() && hashFiles('tmp/visual-artifacts/**') != ''
        uses: actions/upload-artifact@v7
        with:
          name: visual-artifacts
          path: tmp/visual-artifacts
          if-no-files-found: warn

      - name: Upload compose logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: compose-logs
          path: tmp/ci-logs
          if-no-files-found: warn

  publish-runtime:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: Build and push runtime image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
