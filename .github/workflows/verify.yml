name: verify

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  compose-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker versions
        run: |
          docker --version
          docker compose version

      - name: Compose verify
        run: docker compose --profile verify run --rm verify
