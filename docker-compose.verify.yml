services:
  verify:
    build:
      context: .
      dockerfile: Dockerfile.verify
    working_dir: /workspace
    environment:
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target
    depends_on:
      app:
        condition: service_healthy

  visual-verify:
    build:
      context: .
      dockerfile: Dockerfile.visual
    environment:
      APP_URL: http://app:${BIND_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      ARTIFACT_DIR: /artifacts
      SETUP_CODE: ${SETUP_CODE:-visual-setup-code}
    volumes:
      - ./tmp/visual-artifacts:/artifacts
    depends_on:
      app:
        condition: service_healthy
      minio:
        condition: service_healthy

volumes:
  verify-cargo:
    name: kjxlkj-verify-cargo
  verify-target:
    name: kjxlkj-verify-target
