services:
  verify:
    build:
      context: .
      dockerfile: Dockerfile.verify
    working_dir: /workspace
    environment:
      CARGO_TARGET_DIR: /target
    volumes:
      - .:/workspace:ro
      - verify-cargo:/usr/local/cargo/registry
      - verify-target:/target
    depends_on:
      app:
        condition: service_healthy

  visual-verify:
    build:
      context: .
      dockerfile: Dockerfile.visual
    environment:
      APP_URL: http://app:8080
      DATABASE_URL: postgres://kjxlkj:kjxlkjchange123@postgres:5432/kjxlkj
      ARTIFACT_DIR: /artifacts
      SETUP_CODE: visual-setup-code
    volumes:
      - ./tmp/visual-artifacts:/artifacts
    depends_on:
      app:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy

volumes:
  verify-cargo:
    name: kjxlkj-verify-cargo
  verify-target:
    name: kjxlkj-verify-target
