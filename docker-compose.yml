name: kjxlkj

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kjxlkj}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kjxlkj}
      POSTGRES_DB: ${POSTGRES_DB:-kjxlkj}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-kjxlkj} -d ${POSTGRES_DB:-kjxlkj}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadminchange123}
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8080}:${BIND_PORT:-8080}"
    environment:
      BIND_HOST: ${BIND_HOST:-0.0.0.0}
      BIND_PORT: ${BIND_PORT:-8080}
      DATABASE_URL: postgres://${POSTGRES_USER:-kjxlkj}:${POSTGRES_PASSWORD:-kjxlkj}@postgres:5432/${POSTGRES_DB:-kjxlkj}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://minio:9000}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-kjxlkj-media}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-minioadmin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-minioadminchange123}
      S3_PATH_STYLE: ${S3_PATH_STYLE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-fs", "http://localhost:${BIND_PORT:-8080}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres-data:
    name: kjxlkj-postgres-data
  minio-data:
    name: kjxlkj-minio-data
