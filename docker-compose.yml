services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kjxlkj
      POSTGRES_PASSWORD: kjxlkj
      POSTGRES_DB: kjxlkj
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro

  app:
    image: rust:bookworm
    working_dir: /work
    command: bash -lc "/usr/local/cargo/bin/cargo run -- serve"
    environment:
      DATABASE_URL: postgres://kjxlkj:kjxlkj@postgres:5432/kjxlkj
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    volumes:
      - ./:/work
    depends_on:
      - postgres

  verify:
    image: rust:bookworm
    working_dir: /work
    command: >
      bash -lc "/usr/local/cargo/bin/rustup component add rustfmt clippy &&
      /usr/local/cargo/bin/cargo fmt -- --check &&
      /usr/local/cargo/bin/cargo clippy --all-targets -- -D warnings &&
      /usr/local/cargo/bin/cargo test &&
      /usr/local/cargo/bin/cargo build --release &&
      /usr/local/cargo/bin/cargo run -- docs validate-topology &&
      /usr/local/cargo/bin/cargo run -- quality check-lines"
    volumes:
      - ./:/work

volumes:
  pgdata:
