services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: kjxlkj
      POSTGRES_PASSWORD: kjxlkjchange123
      POSTGRES_DB: kjxlkj
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kjxlkj -d kjxlkj"]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:3.97
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /tmp/s3.json <<EOF
        {"identities":[{"name":"app","credentials":[{"accessKey":"kjxlkj","secretKey":"kjxlkjseaweedfschange123"}],"actions":["Admin","Read","Write"]}]}
        EOF
        exec weed server -dir=/data -filer -s3 -s3.port=8333 -s3.config=/tmp/s3.json -volume.fileSizeLimitMB=1024 -filer.concurrentUploadLimitMB=1024 -volume.concurrentUploadLimitMB=1024
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'fs.ls /' | weed shell -master=localhost:9333 -filer=localhost:8888 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      BIND_HOST: 0.0.0.0
      BIND_PORT: "8080"
      DATABASE_URL: postgres://kjxlkj:kjxlkjchange123@postgres:5432/kjxlkj
      SEAWEEDFS_S3_ENDPOINT: http://seaweedfs:8333
      SEAWEEDFS_S3_REGION: us-east-1
      SEAWEEDFS_S3_BUCKET: kjxlkj-media
      SEAWEEDFS_S3_ACCESS_KEY: kjxlkj
      SEAWEEDFS_S3_SECRET_KEY: kjxlkjseaweedfschange123
      SEAWEEDFS_S3_PATH_STYLE: "true"
      MEDIA_UPLOAD_MAX_BYTES: "536870912"
      SITE_ICON_UPLOAD_MAX_BYTES: "2097152"
      SETUP_CODE: visual-setup-code
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

volumes:
  postgres-data:
    name: kjxlkj-postgres-data
  seaweedfs-data:
    name: kjxlkj-seaweedfs-data
