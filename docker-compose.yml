name: kjxlkj

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  seaweedfs:
    image: chrislusf/seaweedfs:3.97
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        cat > /tmp/s3.json <<EOF
        {"identities":[{"name":"app","credentials":[{"accessKey":"$${SEAWEEDFS_S3_ACCESS_KEY}","secretKey":"$${SEAWEEDFS_S3_SECRET_KEY}"}],"actions":["Admin","Read","Write"]}]}
        EOF
        exec weed server -dir=/data -filer -s3 -s3.port=8333 -s3.config=/tmp/s3.json -volume.fileSizeLimitMB=1024 -filer.concurrentUploadLimitMB=1024 -volume.concurrentUploadLimitMB=1024
    environment:
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY}
    volumes:
      - seaweedfs-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo 'fs.ls /' | weed shell -master=localhost:9333 -filer=localhost:8888 >/dev/null 2>&1",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    expose:
      - "${BIND_PORT}"
    environment:
      BIND_HOST: ${BIND_HOST}
      BIND_PORT: ${BIND_PORT}
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      SEAWEEDFS_S3_ENDPOINT: ${SEAWEEDFS_S3_ENDPOINT}
      SEAWEEDFS_S3_REGION: ${SEAWEEDFS_S3_REGION}
      SEAWEEDFS_S3_BUCKET: ${SEAWEEDFS_S3_BUCKET}
      SEAWEEDFS_S3_ACCESS_KEY: ${SEAWEEDFS_S3_ACCESS_KEY}
      SEAWEEDFS_S3_SECRET_KEY: ${SEAWEEDFS_S3_SECRET_KEY}
      SEAWEEDFS_S3_PATH_STYLE: ${SEAWEEDFS_S3_PATH_STYLE}
      MEDIA_UPLOAD_MAX_BYTES: ${MEDIA_UPLOAD_MAX_BYTES}
      SITE_ICON_UPLOAD_MAX_BYTES: ${SITE_ICON_UPLOAD_MAX_BYTES}
      SETUP_CODE: ${SETUP_CODE:-visual-setup-code}
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET:-kjxlkj-turn-secret-change-me}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "curl", "-fs", "http://localhost:${BIND_PORT}/healthz"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  coturn:
    build:
      context: ./coturn
      dockerfile: Dockerfile
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
    expose:
      - "5349"
    volumes:
      - ./nginx/ssl:/etc/coturn/ssl:ro
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-localhost}
      TURN_STATIC_AUTH_SECRET: ${TURN_STATIC_AUTH_SECRET:-kjxlkj-turn-secret-change-me}
      EXTERNAL_IP: ${EXTERNAL_IP:-auto}
    depends_on:
      app:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
      coturn:
        condition: service_started

volumes:
  postgres-data:
    name: kjxlkj-postgres-data
  seaweedfs-data:
    name: kjxlkj-seaweedfs-data
