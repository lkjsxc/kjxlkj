services:
  postgres:
    image: postgres:16-bookworm
    environment:
      POSTGRES_DB: kjxlkj
      POSTGRES_USER: kjxlkj
      POSTGRES_PASSWORD: kjxlkj
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      BIND_HOST: 0.0.0.0
      BIND_PORT: "8080"
      DATA_ROOT: /app/data
      DATABASE_URL: postgresql://kjxlkj:kjxlkj@postgres:5432/kjxlkj
      ADMIN_TOKEN: local-dev-token
      SESSION_TIMEOUT_MINUTES: "1440"
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  verify:
    build:
      context: .
      dockerfile: Dockerfile
      target: verify
    profiles: ["verify"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://kjxlkj:kjxlkj@postgres:5432/kjxlkj
    entrypoint:
      - /bin/bash
      - -c
    command:
      - >-
        cargo fmt -- --check &&
        cargo clippy --all-targets -- -D warnings &&
        cargo test &&
        cargo build --release &&
        ./target/release/kjxlkj docs validate-topology &&
        ./target/release/kjxlkj docs validate-terms &&
        ./target/release/kjxlkj quality check-lines

volumes:
  postgres-data:
