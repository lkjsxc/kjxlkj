services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      BIND_HOST: 0.0.0.0
      BIND_PORT: "8080"
      DATA_ROOT: /app/data
      ADMIN_TOKEN: local-dev-token
    ports:
      - "8080:8080"
    volumes:
      - ./data/records:/app/data/records
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz >/dev/null"]
      interval: 5s
      timeout: 5s
      retries: 12

  verify:
    build:
      context: .
      dockerfile: Dockerfile
      target: verify
    profiles: ["verify"]
    entrypoint:
      - /bin/bash
      - -c
    command:
      - >-
        cargo fmt -- --check &&
        cargo clippy --all-targets -- -D warnings &&
        cargo test &&
        cargo build --release &&
        ./target/release/kjxlkj docs validate-topology &&
        ./target/release/kjxlkj docs validate-terms &&
        ./target/release/kjxlkj quality check-lines
